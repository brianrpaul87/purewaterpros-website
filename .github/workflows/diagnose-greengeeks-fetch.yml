name: Diagnose GreenGeeks fetch

on:
  pull_request:
    branches:
      - main
    types: [synchronize]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'agent/sync-greengeeks-authoritative-july-22'
    runs-on: ubuntu-latest
    steps:
      - name: Inspect GreenGeeks response
        shell: bash
        run: |
          set -euo pipefail
          curl -sS --compressed --retry 2 --retry-delay 1 \
            -A 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/142 Safari/537.36' \
            -H 'Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8' \
            -H 'Cache-Control: no-cache' \
            'https://www.purewaterpros.ca/index.html?github-diagnostic=20260722' \
            -D /tmp/headers.txt -o /tmp/index.html
          echo '--- response headers ---'
          cat /tmp/headers.txt
          echo '--- size and checksum ---'
          wc -c /tmp/index.html
          sha256sum /tmp/index.html
          echo '--- first 500 bytes ---'
          head -c 500 /tmp/index.html
          echo
