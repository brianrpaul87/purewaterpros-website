name: Apply authoritative GreenGeeks archive

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Reconstruct, verify and apply authoritative archive
        shell: bash
        run: |
          set -euo pipefail

          cat .sync-payload/part-00 \
              .sync-payload/part-01 \
              .sync-payload/part-02 \
              .sync-payload/part-03 > /tmp/purewaterpros-update.b64

          base64 --decode /tmp/purewaterpros-update.b64 > /tmp/purewaterpros-update.tar.xz
          echo '8339c2ed81b7b415dabdd7a2fd79410d9652cd0e70a0ca304bb506dd40423e60  /tmp/purewaterpros-update.tar.xz' | sha256sum -c -

          tar -xJf /tmp/purewaterpros-update.tar.xz -C "$GITHUB_WORKSPACE"

          sha256sum -c <<'CHECKSUMS'
          23836849b6d4029be48e8611669fd94df5ddcbcaa88281135692cc2bebbe4d4e  .htaccess
          81d7fb91b94f33efa23b3c66236d26f95da777726572c4103f75690e7e25ee16  chemical-injection-water-treatment-victoria.html
          6ebe307875afa3d7b0441edcb891437ac67190f8a150987c9dff3b6d483fe03a  contact.html
          9d7a73408b83f99bc9476afe390e4806d5b9bf12f53c93eefe2a0cd8c403431d  contact.php
          5b95f2627329754bd2a1dc141109066e02a6efde94d6e6cfcc8a496c3f9eeec1  index.html
          23850658f8eb7f161c59030c8603498ad8803d596adf177a5a66d39595f54672  iron-sulfur-water-treatment-victoria.html
          7d9eeb459d87c4257951b32882d6a791b3b87445cbb59e1211228e9fdf2d34f1  low-yield-well-storage-victoria.html
          0b6e5f6caf8aa4a61d46b8602585bb2d4fe5c4638d65bb2985ff2e3e69b6fb13  privacy-policy.html
          29e17394679251c6394cf20e2cf429b3fd574a529b2a4d0a0b528dac8eac39ac  reverse-osmosis-victoria.html
          12e14cea5bf5ac606ae366731dc9f23d8e1df18d2c95194daf0849b2539f54d5  robots.txt
          ed0d1e7f233ed2800746263677c03d819dc5cb14444cd76e46d602c340abf3e7  service-areas.html
          05ebcab24de0dfcd4a0cbd389ebcd87cd0089f802e5912e4f32401e91cd8c739  sitemap.xml
          7f790df0db254dc6051c1b74ca0d5b81024edd6e9040e1236d43597a9e6c1612  thank-you.html
          cbfb399a7936b32aad2dc3aea8f016738e520a142777e6fe79d693d141407044  uv-water-treatment-victoria.html
          7696f18f0f09ed98d51b718fdb9d8e6e9bb017e5407609402420377f69fcbc4f  water-filtration-victoria.html
          7ec14fc49264564997964b18084da3c87557a9358c5af2cb64d7340c0adb7336  water-softeners-victoria.html
          faacf2da1f14530e30ecee96bfbcd314ab1d7a06cc569a4e544e9bbfdb845c55  water-treatment-langford-west-shore.html
          d93b8540fa7c7cd6011d6df365feb45af40e27f14116b371e247350e42dbcebc  water-treatment-service-victoria.html
          CHECKSUMS

          php -l contact.php
          grep -q '778-400-1267' index.html
          grep -q 'September 2026' index.html

          rm -rf .sync-payload
          rm -f .github/workflows/sync-greengeeks.yml
          rm -f .github/workflows/sync-greengeeks-pr.yml

      - name: Commit verified synchronization
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Sync authoritative GreenGeeks website'
          git push origin HEAD:agent/sync-greengeeks-authoritative-july-22
