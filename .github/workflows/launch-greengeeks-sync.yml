name: Launch GreenGeeks synchronization

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: read

jobs:
  launch:
    if: github.head_ref == 'agent/sync-greengeeks-authoritative-july-22'
    runs-on: ubuntu-latest
    steps:
      - name: Check out synchronization branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Extract synchronization scripts
        shell: python
        run: |
          from pathlib import Path

          source = Path('.github/workflows/sync-greengeeks-pr.yml')
          lines = source.read_text(encoding='utf-8').splitlines()
          scripts = []
          i = 0

          while i < len(lines):
              line = lines[i]
              if line.strip() != 'run: |':
                  i += 1
                  continue

              base_indent = len(line) - len(line.lstrip())
              i += 1
              block = []
              while i < len(lines):
                  current = lines[i]
                  current_indent = len(current) - len(current.lstrip())
                  if current.strip() and current_indent <= base_indent:
                      break
                  block.append(current)
                  i += 1

              nonblank = [len(item) - len(item.lstrip()) for item in block if item.strip()]
              strip_indent = min(nonblank) if nonblank else 0
              script = '\n'.join(item[strip_indent:] if item.strip() else '' for item in block) + '\n'
              scripts.append(script)

          if len(scripts) != 2:
              raise SystemExit(f'Expected 2 synchronization scripts, found {len(scripts)}')

          for index, script in enumerate(scripts):
              path = Path(f'/tmp/greengeeks-sync-{index}.sh')
              path.write_text(script, encoding='utf-8')
              path.chmod(0o700)

      - name: Run verified file synchronization
        shell: bash
        run: /tmp/greengeeks-sync-0.sh

      - name: Commit synchronized files
        shell: bash
        run: /tmp/greengeeks-sync-1.sh
